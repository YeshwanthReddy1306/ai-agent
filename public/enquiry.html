<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Enquire — Resonance Hyderabad</title>
<link rel="stylesheet" href="/tokens.css" />
<link rel="stylesheet" href="/ui.css" />
<style>
  body{display:flex;min-height:100vh;align-items:center;justify-content:center;padding:20px;
    background:
      radial-gradient(1200px 500px at 50% -10%, color-mix(in oklch,var(--accent) 8%,transparent), transparent),
      var(--paper);}
  .card{background:var(--paper-2);border:1px solid var(--line);border-radius:var(--r-lg);
    padding:var(--s5);max-width:440px;width:100%;box-shadow:0 24px 60px -30px color-mix(in oklch,var(--ink) 30%,transparent)}
  h1{font-size:clamp(1.7rem,5vw,2.2rem);margin-bottom:6px}
  h1 em{font-style:normal;color:var(--accent)}
  .sub{color:var(--ink-soft);margin-bottom:var(--s4);font-size:14.5px}
  label{display:block;font-size:12.5px;color:var(--ink-soft);margin:14px 0 5px;font-weight:500}
  label .req{color:var(--accent)}
  input,select{width:100%;min-height:46px;padding:11px 13px;border-radius:var(--r-sm);
    border:1px solid var(--line);background:var(--paper);color:var(--ink);
    font-family:var(--sans);font-size:16px;transition:border-color var(--dur-1)}
  input:focus-visible,select:focus-visible{outline:2px solid var(--accent);outline-offset:1px;border-color:var(--accent)}
  input.invalid{border-color:var(--hot)}
  .err{color:var(--hot);font-size:12.5px;margin-top:4px;min-height:0}
  .row{display:flex;gap:12px}.row>div{flex:1;min-width:0}
  .btn{width:100%;margin-top:var(--s4)}
  .msg{margin-top:var(--s3);text-align:center;font-size:15px}
  .msg.ok{color:var(--ok)} .msg.bad{color:var(--hot)}
  .trust{margin-top:var(--s4);text-align:center;font-size:12.5px;color:var(--ink-faint)}
</style>
</head>
<body>
  <main class="card">
    <h1>We'll call you <em>within minutes.</em></h1>
    <div class="sub">Resonance Hyderabad — IIT-JEE / NEET integrated Intermediate. Tell us a little, and Sneha rings you back.</div>

    <label for="parentName">Parent name <span class="req">*</span></label>
    <input id="parentName" placeholder="Your name" autocomplete="name" />
    <div class="err" id="err-parentName"></div>

    <label for="phone">Phone number <span class="req">*</span></label>
    <input id="phone" placeholder="10-digit mobile" inputmode="numeric" autocomplete="tel" />
    <div class="err" id="err-phone"></div>

    <label for="studentName">Student name</label>
    <input id="studentName" placeholder="Your child's name" />

    <div class="row">
      <div><label for="interest">Stream</label>
        <select id="interest"><option value="MPC + IIT-JEE">MPC + IIT-JEE</option><option value="BiPC + NEET">BiPC + NEET</option><option value="Not sure yet">Not sure yet</option></select></div>
      <div><label for="language">Language</label>
        <select id="language"><option value="te">Telugu</option><option value="hi">Hindi</option><option value="en">English</option></select></div>
    </div>

    <label for="area">Area</label>
    <input id="area" placeholder="e.g. Kukatpally" />

    <button class="btn" id="submitBtn" type="button" onclick="submit()">Request a callback</button>
    <div id="msg" class="msg"></div>
    <div class="trust">No spam. We only call about admissions.</div>
  </main>

<script>
function fieldErr(id, message){
  document.getElementById('err-'+id).textContent = message || '';
  document.getElementById(id).classList.toggle('invalid', !!message);
}
async function submit(){
  const g=id=>document.getElementById(id).value.trim();
  const body={parentName:g('parentName'),phone:g('phone'),studentName:g('studentName'),interest:g('interest'),language:g('language'),area:g('area')};
  const btn=document.getElementById('submitBtn'), m=document.getElementById('msg');
  m.textContent=''; m.className='msg';
  // inline validation, next to the field (not a lone message at the bottom)
  let bad=false;
  fieldErr('parentName', body.parentName ? '' : (bad=true,'Please enter your name.'));
  fieldErr('phone', /^\+?\d[\d\s]{8,}$/.test(body.phone) ? '' : (bad=true,'Enter a valid phone number.'));
  if(bad) return;
  btn.classList.add('is-loading'); btn.disabled=true; btn.textContent='Submitting…';
  try{
    const r=await fetch('/api/enquiry',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(x=>x.json());
    btn.classList.remove('is-loading');
    if(r.ok){
      btn.classList.add('is-success'); btn.textContent='Callback requested ✓';
      m.className='msg ok'; m.textContent=r.message || 'Done — Sneha will call you shortly.';
    }else{
      btn.classList.add('is-error'); btn.disabled=false; btn.textContent='Try again';
      m.className='msg bad'; m.textContent=r.message || r.error || 'Please try again.';
    }
  }catch(e){
    btn.classList.remove('is-loading'); btn.classList.add('is-error'); btn.disabled=false; btn.textContent='Try again';
    m.className='msg bad'; m.textContent='Something went wrong — please call us directly.';
  }
}
</script>
</body>
</html>
